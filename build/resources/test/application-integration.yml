spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

kafka:
  bootstrap-servers: ${spring.embedded.kafka.brokers}
  consumer:
    group-id: kafka-processor-test-group
    concurrency: 1
  topic:
    input: test-input-topic
    output: test-output-topic
    siphon-bde: test-siphon-bde-topic
  producer:
    transactional-id-prefix: kafkaprocessor-test-tx

app:
  processing:
    delay-ms: 0
    worker-threads: 2
  siphon:
    enabled: [bde]

server:
  port: 0
