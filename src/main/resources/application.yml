spring:
  datasource:
    url: jdbc:h2:mem:controldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

kafka:
  # Comma-separated list of Kafka broker addresses
  bootstrap-servers: localhost:9092

  consumer:
    # Shared groupId across all instances for coordinated partition consumption
    group-id: kafka-processor-group
    # Number of consumer threads per instance. Each thread handles exactly one partition.
    # Formula: concurrency = partitions / instances
    # Example: 10 partitions / 10 instances = 1 thread per instance = 1 partition per instance.
    # Setting this higher than (partitions / instances) leaves excess threads with no partition to read.
    concurrency: 1

  topic:
    # Topic this application reads messages from
    input: input-topic
    # Topic this application publishes processed messages to
    output: output-topic

  producer:
    # Transactional ID prefix for exactly-once semantics (EOS).
    # Must be unique per instance — append an instance ID in multi-instance deployments.
    transactional-id-prefix: kafkaprocessor-tx

# -----------------------------------------------------------------------
# Application-specific settings — not part of Kafka or Spring internals.
# These are custom properties read directly by our application code.
# -----------------------------------------------------------------------
app:
  processing:
    # How long (ms) the processor waits before executing business logic on each message.
    # This is a deliberate delay to account for upstream race conditions.
    # It is NOT a Kafka setting — the consumer thread returns immediately after scheduling;
    # the delay is handled by a ScheduledExecutorService so many messages wait in parallel.
    # Set to 0 to disable the delay. Default: 20000 (20 seconds).
    delay-ms: 20000
    # Number of worker threads in the scheduled processing pool per instance.
    # Each in-flight message (waiting out its delay) occupies one thread.
    # Size to: expected message rate (msg/sec) * delay-ms / 1000
    # Example: 12 msg/sec * 20s = 240 in-flight messages -> set worker-threads >= 240.
    worker-threads: 240

server:
  port: 8080
