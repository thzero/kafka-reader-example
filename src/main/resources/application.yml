spring:
  profiles:
    # Active profiles control metrics registry and log format:
    #   prometheus (default) — exposes /actuator/prometheus for local Prometheus/Grafana
    #   datadog             — pushes metrics to Datadog (requires DD_API_KEY env var)
    #   local    (default)  — human-readable log output; omit for JSON logs (CI/prod)
    #
    # Override at startup:
    #   .\gradlew bootRun --args='--spring.profiles.active=prometheus'   (JSON logs, local metrics)
    #   .\gradlew bootRun --args='--spring.profiles.active=datadog'      (JSON logs, Datadog metrics)
    #   SPRING_PROFILES_ACTIVE=datadog java -jar app.jar
    default: prometheus,local
  datasource:
    url: jdbc:h2:mem:controldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

kafka:
  # Comma-separated list of Kafka broker addresses
  bootstrap-servers: localhost:9092

  consumer:
    # Shared groupId across all instances for coordinated partition consumption
    group-id: kafka-processor-group
    # Number of consumer threads per instance. Each thread handles exactly one partition.
    # Formula: concurrency = partitions / instances
    # Example: 10 partitions / 10 instances = 1 thread per instance = 1 partition per instance.
    # Setting this higher than (partitions / instances) leaves excess threads with no partition to read.
    concurrency: 1

  topic:
    # Topic this application reads messages from
    input: input-topic
    # Topic this application publishes processed messages to
    output: output-topic
    # Siphon topics — one key per SiphonEvaluator implementation.
    # Naming convention: kafka.topic.siphon-{event-code}
    # Each evaluator injects its own key via @Value("${kafka.topic.siphon-{code}}").
    siphon-bde: siphon-bde-topic   # BdeSiphonEvaluator — Backdated Endorsements (END + backdated=true)

  producer:
    # Transactional ID prefix for exactly-once semantics (EOS).
    # A random UUID suffix is appended at startup to guarantee uniqueness across instances.
    # Each restart gets a fresh ID — orphaned transactions from a previous run time out naturally.
    transactional-id-prefix: kafkaprocessor-tx-${random.uuid}

# -----------------------------------------------------------------------
# Application-specific settings — not part of Kafka or Spring internals.
# These are custom properties read directly by our application code.
# -----------------------------------------------------------------------
app:
  processing:
    # Scheduler delay (ms): how long the ScheduledExecutorService waits before handing the
    # task to a worker thread. Consumer thread returns immediately after scheduling.
    # Use this to throttle how quickly new messages enter the worker pool.
    # Set to 0 to disable. Default: 30000 (30 seconds).
    delay-ms: 30000
    # Worker delay (ms): Thread.sleep inside the worker thread before executing business logic.
    # Runs concurrently across all in-flight messages on their own worker threads.
    # Use this to enforce a minimum processing wait (e.g. upstream race condition buffer).
    # Set to 0 to disable. Default: 20000 (20 seconds).
    worker-delay-ms: 20000
    # Core pool size for the ScheduledThreadPoolExecutor (backed by virtual threads).
    # Virtual threads are cheap: Thread.sleep and I/O unmount the carrier thread rather than
    # blocking it, so the old msg/sec * delay sizing formula no longer applies.
    # This value controls how many threads are kept ready to fire scheduled tasks on time.
    # A small value (e.g. 8-16 * CPU cores) is sufficient for most workloads.
    worker-threads: 32
  siphon:
    # Event codes of SiphonEvaluator implementations to activate.
    # Matches SiphonEvaluator.eventCode() on each implementation.
    # Empty list = all registered evaluators are active.
    enabled: [bde]

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # prometheus endpoint added by application-prometheus.yml
  endpoint:
    health:
      show-details: always   # expose component details at GET /actuator/health
  health:
    defaults:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        kafka.processor.e2e.latency: true
        kafka.processor.pipeline.latency: true
        jvm.gc.pause: true
      percentiles:
        kafka.processor.e2e.latency: 0.5,0.95,0.99
        kafka.processor.pipeline.latency: 0.5,0.95,0.99
        jvm.gc.pause: 0.5,0.95,0.99

server:
  port: 8080
